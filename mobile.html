<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AZIS — Luxury Furniture</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Playfair+Display:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #050505;
    --gold: #c9a84c;
    --gold-light: #e4cc7a;
    --gold-dark: #8a6d2b;
    --gold-glow: rgba(201,168,76,0.15);
    --black-rich: #0a0a0a;
    --text: #f0ead6;
    --text-dim: #6b6347;
    --border-gold: #2d2618;
  }

  body {
    font-family: 'Playfair Display', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }

  /* ─── HEADER BAR ─── */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    padding: 0 12px;
    background: rgba(5,5,5,0.95);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border-gold);
  }

  .header-logo-link {
    display: flex;
    align-items: center;
    text-decoration: none;
    padding: 10px 0;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .header-logo-img {
    height: 44px;
    width: auto;
    filter: brightness(1.8) drop-shadow(0 0 8px rgba(255,255,255,0.1));
  }

  .header-nav {
    display: flex;
    align-items: center;
    gap: 0;
    margin-left: auto;
  }

  /* ─── STORY LINK ─── */
  .story-link {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    padding: 10px 10px;
    border-right: 1px solid var(--border-gold);
  }
  .story-link:active { opacity: 0.7; }
  .story-link .story-brand {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-light);
    line-height: 1;
  }
  .story-link .story-tagline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.8px;
    color: var(--gold);
    margin-top: 3px;
    line-height: 1.3;
    max-width: 160px;
  }

  /* ─── YEAR BUTTONS ─── */
  .year-btn {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 2px;
    padding: 14px 16px;
    border: none;
    background: transparent;
    color: var(--text-body, #b8b0a0);
    cursor: pointer;
    transition: all 0.4s ease;
    text-transform: uppercase;
    position: relative;
  }

  .year-btn::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    right: 20%;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.4s ease;
    box-shadow: 0 0 8px rgba(201,168,76,0.4);
  }

  .year-btn.active::after { transform: scaleX(1); }
  .year-btn.active {
    color: var(--gold-light);
    text-shadow: 0 0 16px rgba(201,168,76,0.3);
  }

  .year-btn .badge {
    display: inline-block;
    font-family: 'Playfair Display', serif;
    font-size: 6px;
    font-weight: 700;
    letter-spacing: 1.5px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #000;
    padding: 2px 5px;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* ─── SHOWCASE IMAGE ─── */
  .showcase-image {
    position: relative;
    width: 100%;
    margin-bottom: 4px;
  }

  .showcase-image img {
    width: 100%;
    height: auto;
    display: block;
  }

  .showcase-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, transparent 0%, transparent 85%, rgba(5,5,5,0.3) 93%, var(--bg) 100%),
      linear-gradient(to top, transparent 97%, rgba(5,5,5,0.3) 100%),
      linear-gradient(to right, var(--bg) 0%, transparent 3%, transparent 97%, var(--bg) 100%);
    pointer-events: none;
  }

  /* ─── HERO IMAGE ─── */
  .hero {
    position: relative;
    width: 100%;
    max-height: 45vh;
    overflow: hidden;
  }

  .hero img {
    width: 100%;
    height: auto;
    display: block;
  }

  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom, transparent 0%, transparent 55%, rgba(5,5,5,0.4) 75%, var(--bg) 95%),
      linear-gradient(to top, transparent 90%, rgba(5,5,5,0.5) 100%),
      linear-gradient(to right, var(--bg) 0%, transparent 5%, transparent 95%, var(--bg) 100%);
    pointer-events: none;
  }

  /* ─── COLLECTIONS ─── */
  .collections-wrapper {
    padding: 0 0 50px;
  }

  .year-section {
    display: none;
    animation: fadeUp 0.5s ease forwards;
  }
  .year-section.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .collection-block {
    padding: 20px 8px 0;
  }

  .collection-label {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 16px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 4px;
    padding-left: 4px;
  }

  .collection-sub {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: 9px;
    letter-spacing: 2.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-left: 4px;
  }

  /* ─── GOLD SEPARATOR ─── */
  .gold-sep {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px 32px;
    gap: 10px;
  }
  .gold-sep .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dark));
  }
  .gold-sep .line:last-child {
    background: linear-gradient(90deg, var(--gold-dark), transparent);
  }
  .gold-sep .diamond {
    width: 5px;
    height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 6px rgba(201,168,76,0.4);
  }

  /* ─── IMAGE GRID ─── */
  .collection-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
  }

  .collection-item {
    position: relative;
    aspect-ratio: 1 / 1.3;
    overflow: hidden;
    background: var(--black-rich);
    border: 1px solid var(--border-gold);
  }

  .collection-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease, opacity 0.4s ease;
    opacity: 0;
    filter: sepia(0.3) saturate(1.3) brightness(0.88) contrast(1.08) hue-rotate(-8deg);
  }

  .collection-item img.loaded { opacity: 1; }

  .collection-item:active img {
    transform: scale(1.05);
  }

  /* Gold vignette */
  .collection-item .gold-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 40%, rgba(5,5,5,0.5) 100%),
      linear-gradient(180deg, transparent 60%, rgba(201,168,76,0.06) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Corner accents */
  .corner-tl, .corner-br {
    position: absolute;
    width: 12px;
    height: 12px;
    z-index: 2;
    pointer-events: none;
  }
  .corner-tl {
    top: 0; left: 0;
    border-top: 1px solid var(--gold-dark);
    border-left: 1px solid var(--gold-dark);
  }
  .corner-br {
    bottom: 0; right: 0;
    border-bottom: 1px solid var(--gold-dark);
    border-right: 1px solid var(--gold-dark);
  }

  /* Shimmer loader */
  .img-placeholder {
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg, #0c0a06 30%, #1a1508 50%, #0c0a06 70%);
    background-size: 200% 100%;
    animation: shimmer 1.8s ease-in-out infinite;
  }
  .img-placeholder.hidden { display: none; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ─── FOOTER ─── */
  .site-footer {
    text-align: center;
    padding: 28px 16px 40px;
    position: relative;
  }

  .site-footer::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
  }

  .footer-logo-container {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .footer-logo-img {
    height: 44px;
    width: auto;
    filter: brightness(1.8) drop-shadow(0 0 6px rgba(255,255,255,0.1));
  }

  .footer-copy {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-top: 12px;
  }

  .gold-ambient {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent 10%, var(--gold-dark) 35%, var(--gold) 50%, var(--gold-dark) 65%, transparent 90%);
    opacity: 0.5;
    margin-top: 20px;
  }
</style>
</head>

<script>
  const buttons = document.querySelectorAll('.year-btn');
  const sections = document.querySelectorAll('.year-section');
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const year = btn.dataset.year;
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      sections.forEach(s => {
        s.classList.remove('active');
        if (s.id === `year-${year}`) s.classList.add('active');
      });
    });
  });
</script>
